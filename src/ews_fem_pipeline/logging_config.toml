version = 1
disable_existing_loggers = false

[formatters.standard]
format = "%(asctime)s [%(levelname)s] %(name)s: %(message)s"

[handlers.stdout]
class = "logging.StreamHandler"
level = "DEBUG"
formatter = "standard"
stream = "ext://sys.stdout"

[handlers.file]
class = "logging.FileHandler"
formatter = "standard"
filename = "ews_fem_pipeline.log"
mode = "a"

[root]
level = "DEBUG"
handlers = ["stdout", "file"]